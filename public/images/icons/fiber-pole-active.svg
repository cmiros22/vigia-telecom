<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" fill="none">
  <!-- Poste principal -->
  <rect x="11" y="8" width="2" height="20" fill="#4B5563" stroke="#1F2937" stroke-width="0.5"/>
  
  <!-- Cruz superior del poste -->
  <rect x="8" y="6" width="8" height="1.5" fill="#4B5563" stroke="#1F2937" stroke-width="0.5"/>
  <rect x="11.25" y="4" width="1.5" height="4" fill="#4B5563" stroke="#1F2937" stroke-width="0.5"/>
  
  <!-- Cables de fibra óptica con brillo -->
  <line x1="11" y1="8" x2="8" y2="4" stroke="#2563EB" stroke-width="1.2" opacity="0.9"/>
  <line x1="13" y1="8" x2="16" y2="4" stroke="#2563EB" stroke-width="1.2" opacity="0.9"/>
  <line x1="12" y1="10" x2="9" y2="6" stroke="#2563EB" stroke-width="1.2" opacity="0.9"/>
  <line x1="12" y1="12" x2="15" y2="8" stroke="#2563EB" stroke-width="1.2" opacity="0.9"/>
  <line x1="11.5" y1="14" x2="8.5" y2="10" stroke="#3B82F6" stroke-width="1" opacity="0.7"/>
  <line x1="12.5" y1="14" x2="15.5" y2="10" stroke="#3B82F6" stroke-width="1" opacity="0.7"/>
  
  <!-- Base del poste -->
  <rect x="9" y="26" width="6" height="3" fill="#1F2937" rx="0.5"/>
  
  <!-- Conector de fibra con efecto de brillo -->
  <circle cx="12" cy="8" r="2" fill="#2563EB" opacity="0.9"/>
  <circle cx="12" cy="8" r="1.5" fill="#3B82F6"/>
  <circle cx="12" cy="8" r="0.8" fill="#60A5FA"/>
  
  <!-- Indicador de señal activa -->
  <circle cx="12" cy="8" r="3" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.6"/>
  <circle cx="12" cy="8" r="4" fill="none" stroke="#3B82F6" stroke-width="0.3" opacity="0.4"/>
</svg>
