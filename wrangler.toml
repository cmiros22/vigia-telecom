name = "vigia-telecom"
main = "_worker.js"
compatibility_date = "2026-04-22"

[site]
bucket = "./dist"

[vars]
PUBLIC_MAPBOX_TOKEN = "xxx"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1